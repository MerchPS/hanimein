<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniNexus - Streaming Anime Gratis Terlengkap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0c12 0%, #0f1119 100%);
            color: #eef2ff;
        }

        .navbar {
            background: rgba(10, 12, 18, 0.95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 94, 124, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 16px 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .nav-flex {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF5E7C, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo i {
            background: none;
            color: #FF5E7C;
        }

        .search-box {
            display: flex;
            background: #1e1f2c;
            border-radius: 60px;
            padding: 8px 20px;
            align-items: center;
            gap: 12px;
            flex: 1;
            max-width: 450px;
            border: 1px solid #2d2f3e;
        }

        .search-box:focus-within {
            border-color: #FF5E7C;
            box-shadow: 0 0 10px rgba(255, 94, 124, 0.3);
        }

        .search-box input {
            background: transparent;
            border: none;
            padding: 10px 0;
            color: white;
            width: 100%;
            outline: none;
            font-size: 0.95rem;
        }

        .search-box button {
            background: none;
            border: none;
            color: #ffb347;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .tabs {
            display: flex;
            gap: 12px;
            background: #1e1f2c;
            padding: 6px;
            border-radius: 50px;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            color: #a0a8c0;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #FF5E7C;
            color: white;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 24px;
            margin: 40px 0;
        }

        .anime-card {
            background: #13151f;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid #262838;
        }

        .anime-card:hover {
            transform: translateY(-6px);
            border-color: #FF5E7C;
            box-shadow: 0 15px 30px rgba(255, 94, 124, 0.15);
        }

        .card-img {
            aspect-ratio: 2 / 2.8;
            overflow: hidden;
            position: relative;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .source-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #FF5E7C;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: bold;
        }

        .card-info {
            padding: 12px;
        }

        .card-title {
            font-weight: 700;
            font-size: 0.9rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .rating {
            font-size: 0.7rem;
            color: #FFB347;
            margin-top: 6px;
        }

        .loader {
            text-align: center;
            padding: 60px;
        }

        .loader i {
            font-size: 3rem;
            color: #FF5E7C;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .episode-panel {
            background: #10121c;
            border-radius: 28px;
            padding: 28px;
            margin: 20px 0;
        }

        .anime-header {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .anime-poster {
            width: 200px;
            border-radius: 16px;
            overflow: hidden;
        }

        .anime-poster img {
            width: 100%;
        }

        .anime-info-det {
            flex: 1;
        }

        .genres {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }

        .genre-tag {
            background: #FF5E7C;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .episode-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .episode-btn {
            background: #1e2130;
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 600;
            color: #eef2ff;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
        }

        .episode-btn:hover, .episode-btn.active-ep {
            background: #FF5E7C;
            transform: scale(1.02);
        }

        .video-container {
            margin-top: 20px;
            border-radius: 16px;
            overflow: hidden;
            background: black;
        }

        video {
            width: 100%;
            max-height: 500px;
            outline: none;
        }

        .back-btn {
            background: none;
            border: 2px solid #ff5e7c;
            padding: 10px 24px;
            border-radius: 40px;
            color: #ff5e7c;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #ff5e7c;
            color: white;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 30px 0;
        }

        .page-btn {
            background: #1e2130;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
        }

        .page-btn:hover:not(:disabled) {
            background: #FF5E7C;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .notice {
            background: #FF5E7C20;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin: 40px 0;
        }

        footer {
            text-align: center;
            padding: 32px;
            color: #6c7293;
            border-top: 1px solid #1e2130;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 16px;
            }
            .anime-grid {
                gap: 14px;
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            .anime-poster {
                width: 120px;
            }
            .tabs {
                width: 100%;
                justify-content: center;
            }
            .tab-btn {
                padding: 6px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="navbar">
    <div class="container nav-flex">
        <div class="logo">
            <i class="fas fa-film"></i> AniNexus
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cari anime... (Naruto, One Piece, Jujutsu)">
            <button id="searchBtn"><i class="fas fa-search"></i></button>
        </div>
    </div>
</div>

<div class="container">
    <div class="tabs" style="margin: 20px 0;">
        <button class="tab-btn active" data-type="recent">🔥 Recent</button>
        <button class="tab-btn" data-type="trending">📈 Trending</button>
        <button class="tab-btn" data-type="popular">⭐ Popular</button>
    </div>

    <div id="homeView">
        <div id="animeGrid" class="anime-grid"></div>
        <div id="pagination" class="pagination"></div>
    </div>

    <div id="detailView" style="display: none;">
        <button class="back-btn" id="backHomeBtn"><i class="fas fa-arrow-left"></i> Back to Home</button>
        <div id="detailContent"></div>
    </div>
</div>

<footer>
    <p>© 2024 AniNexus | Stream anime gratis terbaik | Sumber: AniList & MyAnimeList</p>
</footer>

<script>
    let currentType = 'recent';
    let currentPage = 1;
    let currentSearchQuery = '';
    let currentAnimeId = null;

    async function apiCall(endpoint) {
        try {
            const response = await fetch(endpoint);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.json();
        } catch (error) {
            console.error('API Error:', error);
            return null;
        }
    }

    async function loadAnimes() {
        const grid = document.getElementById('animeGrid');
        grid.innerHTML = '<div class="loader"><i class="fas fa-spinner fa-pulse"></i><p style="margin-top: 10px;">Loading anime...</p></div>';
        
        let url = `/api/anime?type=${currentType}&page=${currentPage}`;
        if (currentSearchQuery) {
            url = `/api/anime?q=${encodeURIComponent(currentSearchQuery)}&page=${currentPage}`;
        }
        
        const data = await apiCall(url);
        
        if (data && data.animes && data.animes.length > 0) {
            renderAnimeGrid(data.animes);
            if (data.isFallback) {
                const notice = document.createElement('div');
                notice.className = 'notice';
                notice.innerHTML = '<i class="fas fa-info-circle"></i> Using fallback data. API sedang dalam pemeliharaan.';
                grid.parentNode.insertBefore(notice, grid);
                setTimeout(() => notice.remove(), 3000);
            }
        } else {
            grid.innerHTML = '<div class="notice"><i class="fas fa-frown"></i> No anime found. Try searching something else!</div>';
        }
    }

    function renderAnimeGrid(animes) {
        const grid = document.getElementById('animeGrid');
        
        grid.innerHTML = animes.map(anime => `
            <div class="anime-card" data-id="${anime.id}">
                <div class="card-img">
                    <img src="${anime.poster || 'https://via.placeholder.com/200x280?text=Anime'}" 
                         onerror="this.src='https://via.placeholder.com/200x280?text=No+Image'">
                    <div class="source-badge">${anime.source || 'AniList'}</div>
                </div>
                <div class="card-info">
                    <div class="card-title">${escapeHtml(anime.title)}</div>
                    ${anime.rating && anime.rating !== 'N/A' ? `<div class="rating"><i class="fas fa-star"></i> ${anime.rating}</div>` : ''}
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.anime-card').forEach(card => {
            card.addEventListener('click', () => showDetail(card.dataset.id));
        });
    }

    async function showDetail(id) {
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('detailView').style.display = 'block';
        const detailDiv = document.getElementById('detailContent');
        detailDiv.innerHTML = '<div class="loader"><i class="fas fa-spinner fa-pulse"></i><p>Loading anime details...</p></div>';
        
        currentAnimeId = id;
        const data = await apiCall(`/api/anime/${id}`);
        
        if (data && !data.error) {
            renderDetail(data);
        } else {
            detailDiv.innerHTML = '<div class="notice"><i class="fas fa-exclamation-triangle"></i> Failed to load anime details.</div>';
        }
    }

    function renderDetail(detail) {
        const container = document.getElementById('detailContent');
        
        container.innerHTML = `
            <div class="episode-panel">
                <div class="anime-header">
                    <div class="anime-poster">
                        <img src="${detail.poster || 'https://via.placeholder.com/200x280'}" onerror="this.src='https://via.placeholder.com/200x280'">
                    </div>
                    <div class="anime-info-det">
                        <h2>${escapeHtml(detail.title)}</h2>
                        ${detail.rating ? `<div class="rating"><i class="fas fa-star"></i> Rating: ${detail.rating}</div>` : ''}
                        ${detail.genres && detail.genres.length ? `
                            <div class="genres">
                                ${detail.genres.map(g => `<span class="genre-tag">${escapeHtml(g)}</span>`).join('')}
                            </div>
                        ` : ''}
                        <p style="margin-top: 16px; line-height: 1.6;">${escapeHtml(detail.sinopsis?.substring(0, 500) || 'Sinopsis tidak tersedia')}${detail.sinopsis?.length > 500 ? '...' : ''}</p>
                    </div>
                </div>
                <h3><i class="fas fa-list"></i> Episodes (${detail.episodes?.length || 0})</h3>
                <div id="episodeList" class="episode-list"></div>
                <div id="videoArea">
                    <div class="video-container">
                        <video id="animeVideo" controls style="width:100%"></video>
                    </div>
                </div>
            </div>
        `;
        
        const epsContainer = document.getElementById('episodeList');
        if (!detail.episodes || detail.episodes.length === 0) {
            epsContainer.innerHTML = '<div class="notice">No episodes available yet.</div>';
        } else {
            epsContainer.innerHTML = detail.episodes.map((ep, idx) => `
                <button class="episode-btn" data-episode="${ep.episode}">
                    <i class="fas fa-play-circle"></i> Episode ${ep.episode} ${ep.title ? `- ${ep.title.substring(0, 30)}` : ''}
                </button>
            `).join('');
            
            document.querySelectorAll('.episode-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    document.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active-ep'));
                    btn.classList.add('active-ep');
                    await playEpisode(btn.dataset.episode);
                });
            });
        }
    }
    
    async function playEpisode(episodeNum) {
        const video = document.getElementById('animeVideo');
        const videoContainer = document.querySelector('.video-container');
        videoContainer.innerHTML = '<div class="loader"><i class="fas fa-spinner fa-pulse"></i><p>Loading stream...</p></div>';
        
        try {
            const data = await apiCall(`/api/stream/${currentAnimeId}/${episodeNum}`);
            
            if (data && data.videos && data.videos.length > 0) {
                const videoUrl = data.videos[0].url;
                videoContainer.innerHTML = '<video id="animeVideo" controls style="width:100%"></video>';
                const newVideo = document.getElementById('animeVideo');
                
                if (Hls.isSupported() && videoUrl.includes('.m3u8')) {
                    const hls = new Hls();
                    hls.loadSource(videoUrl);
                    hls.attachMedia(newVideo);
                } else {
                    newVideo.src = videoUrl;
                }
                newVideo.play().catch(e => console.log('Auto-play prevented'));
            } else {
                videoContainer.innerHTML = '<div class="notice"><i class="fas fa-exclamation-triangle"></i> Stream not available for this episode.</div>';
            }
        } catch (error) {
            videoContainer.innerHTML = `<div class="notice"><i class="fas fa-exclamation-triangle"></i> Error: ${error.message}</div>`;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Event Listeners
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentType = btn.dataset.type;
            currentSearchQuery = '';
            currentPage = 1;
            document.getElementById('searchInput').value = '';
            loadAnimes();
        });
    });

    document.getElementById('searchBtn').addEventListener('click', () => {
        const query = document.getElementById('searchInput').value.trim();
        if (query) {
            currentSearchQuery = query;
            currentPage = 1;
            loadAnimes();
        }
    });

    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('searchBtn').click();
    });

    document.getElementById('backHomeBtn').addEventListener('click', () => {
        document.getElementById('detailView').style.display = 'none';
        document.getElementById('homeView').style.display = 'block';
        loadAnimes();
    });

    // Load initial
    loadAnimes();
</script>
</body>
</html>
